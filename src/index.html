<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' node:; connect-src 'self' https://api.deepseek.com https://*.deepseek.com https://api.openai.com https://api.anthropic.com; img-src 'self' data: https://*.tile.openstreetmap.org; script-src 'self' 'unsafe-inline' 'unsafe-eval' node:; style-src 'self' 'unsafe-inline'; font-src 'self' data:;">
  <title>GISBuddy</title>
  <link rel="stylesheet" href="../dist/renderer/leaflet.css" />
  <link rel="stylesheet" href="../dist/renderer/app.css" />
  <style>
    body { margin: 0; padding: 0; overflow: hidden; }
    #app { width: 100vw; height: 100vh; }
    .leaflet-container { width: 100%; height: 100%; }
    /* Sidebar project rows: reveal action buttons only on hover/focus. */
    .project-row .project-action-btn { opacity: 0; transition: opacity 0.1s; }
    .project-row:hover .project-action-btn,
    .project-row .project-action-btn:focus { opacity: 1; }
    /* New-project button: hidden by default, revealed on sidebar hover for immersion. */
    .new-project-btn { opacity: 0; transition: opacity 0.15s; }
    [data-testid="sidebar"]:hover .new-project-btn,
    .new-project-btn:focus { opacity: 1; }
    /* Override pi-web-ui theme variables to match the warm paper/wood palette.
       Default --background is pure white (oklch 100% 0 0) and --foreground is
       near-black (oklch 14.5% 0 0) — too harsh. Soften to warm tones. */
    :root {
      --background: #ece8de;
      --foreground: #5a544a;
      --border: #d8d0c2;
      --color-text-primary: #5a544a;
      --color-border: #d8d0c2;
    }
    /* Left-align chat message content (pi-chat-panel uses max-w-3xl mx-auto,
       which centers a 768px column and leaves blank margins when the panel is
       wider — e.g. after collapsing the sidebar. Override mx-auto to mx-0 so
       content hugs the left edge; the max-width is preserved for readability.
       When the panel is narrower than 768px (sidebar expanded), mx-auto has no
       visible effect anyway, so this override is safe in both states.) */
    pi-chat-panel .max-w-3xl.mx-auto {
      margin-left: 0 !important;
      margin-right: 0 !important;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.addEventListener('error', function(e) {
      document.getElementById('app').innerHTML = '<pre style="color:red;padding:20px;">FATAL: ' + e.message + '\n' + (e.error && e.error.stack || '') + '</pre>';
    });
    window.addEventListener('unhandledrejection', function(e) {
      console.error('Unhandled rejection:', e.reason);
    });
  </script>
  <script src="../dist/renderer/bundle.js"></script>
</body>
</html>
