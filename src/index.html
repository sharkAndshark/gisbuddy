<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;">
  <title>GISBuddy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="config-overlay" class="config-overlay">
    <div class="config-card">
      <h1>GISBuddy</h1>
      <p class="config-subtitle">AI 驱动的 GIS 数据处理助手</p>
      <div class="config-form">
        <label for="api-key">DeepSeek API Key</label>
        <input type="password" id="api-key" placeholder="sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" />
        <p class="config-hint">输入你的 DeepSeek API Key。可在 <a href="https://platform.deepseek.com/api_keys" target="_blank">platform.deepseek.com</a> 获取</p>
        <button id="save-key">开始使用</button>
      </div>
    </div>
  </div>

  <div id="app" class="app hidden">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">对话列表</div>
        <button id="new-conv-btn" class="new-conv-btn" title="新建对话">✚</button>
      </div>
      <div id="conv-list" class="conv-list"></div>
    </aside>

    <div class="main-content">
      <header class="app-header">
        <div class="header-left">
          <h1 id="conv-title">GISBuddy</h1>
          <span id="conv-folder-badge" class="folder-badge hidden"></span>
        </div>
        <div class="header-right">
          <button id="open-folder-btn" class="icon-btn" title="打开工作文件夹">📂</button>
          <button id="settings-btn" class="icon-btn" title="设置">⚙️</button>
        </div>
      </header>

      <main id="chat-container" class="chat-container">
        <div class="welcome" id="welcome">
          <div class="welcome-icon">🌍</div>
          <h2>你好！我是 GISBuddy</h2>
          <p>选择一个对话，或新建一个对话开始处理 GIS 数据</p>
          <div class="suggestions">
            <button class="suggestion" data-msg="查看当前目录有哪些文件">📂 查看目录文件</button>
            <button class="suggestion" data-msg="用 gdalinfo 查看 data.tif 的信息">🔍 探查栅格数据</button>
            <button class="suggestion" data-msg="把 data.shp 转换成 GeoJSON">🔄 格式转换</button>
            <button class="suggestion" data-msg="用 gdalwarp 把数据重投影到 EPSG:4326">🗺️ 重投影</button>
          </div>
        </div>
      </main>

      <footer class="input-area">
        <div class="input-wrapper">
          <textarea id="input" rows="1" placeholder="选择一个对话后开始..." disabled></textarea>
          <button id="send-btn" class="send-btn" disabled>发送</button>
        </div>
      </footer>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
