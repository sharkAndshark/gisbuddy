<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net node:; img-src 'self' data: https://*.tile.openstreetmap.org; script-src 'self' 'unsafe-inline' 'unsafe-eval' node:; style-src 'self' 'unsafe-inline'; font-src 'self' data:;">
  <title>GISBuddy</title>
  <style>
    body { margin: 0; padding: 0; overflow: hidden; }
    #app { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.addEventListener('error', function(e) {
      document.getElementById('app').innerHTML = '<pre style="color:red;padding:20px;">FATAL: ' + e.message + '\n' + (e.error && e.error.stack || '') + '</pre>';
    });
    window.addEventListener('unhandledrejection', function(e) {
      console.error('Unhandled rejection:', e.reason);
    });
  </script>
  <script src="../dist/renderer/bundle.js"></script>
</body>
</html>
