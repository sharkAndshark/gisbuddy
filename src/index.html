<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' node:; connect-src 'self' https://api.deepseek.com https://*.deepseek.com https://api.openai.com https://api.anthropic.com; img-src 'self' data: https://*.tile.openstreetmap.org; script-src 'self' 'unsafe-inline' 'unsafe-eval' node:; style-src 'self' 'unsafe-inline'; font-src 'self' data:;">
  <title>GISBuddy</title>
  <link rel="stylesheet" href="../dist/renderer/leaflet.css" />
  <link rel="stylesheet" href="../dist/renderer/app.css" />
  <style>
    body { margin: 0; padding: 0; overflow: hidden; }
    #app { width: 100vw; height: 100vh; }
    .leaflet-container { width: 100%; height: 100%; }
    /* Sidebar project rows: reveal action buttons only on hover/focus. */
    .project-row .project-action-btn { opacity: 0; transition: opacity 0.1s; }
    .project-row:hover .project-action-btn,
    .project-row .project-action-btn:focus { opacity: 1; }
    /* New-project button: hidden by default, revealed on sidebar hover for immersion. */
    .new-project-btn { opacity: 0; transition: opacity 0.15s; }
    [data-testid="sidebar"]:hover .new-project-btn,
    .new-project-btn:focus { opacity: 1; }
    /* Override pi-web-ui theme variables to match the warm paper/wood palette.
       Default --background is pure white (oklch 100% 0 0) and --foreground is
       near-black (oklch 14.5% 0 0) — too harsh. Soften to warm tones. */
    :root {
      --background: #ece8de;
      --foreground: #5a544a;
      --border: #d8d0c2;
      --color-text-primary: #5a544a;
      --color-border: #d8d0c2;
      /* Print aesthetic: collapse card/muted surfaces into the paper so no
         filled color blocks remain in the conversation area. --popover and
         --accent are left as real colors so dropdowns and hover states still
         read. --card-foreground stays the text color. */
      --card: transparent;
      --card-foreground: #5a544a;
      --muted: transparent;
    }
    /* Left-align chat message content (pi-chat-panel uses max-w-3xl mx-auto,
       which centers a 768px column and leaves blank margins when the panel is
       wider — e.g. after collapsing the sidebar. Override mx-auto to mx-0 so
       content hugs the left edge; the max-width is preserved for readability.
       When the panel is narrower than 768px (sidebar expanded), mx-auto has no
       visible effect anyway, so this override is safe in both states.) */
    pi-chat-panel .max-w-3xl.mx-auto {
      margin-left: 0 !important;
      margin-right: 0 !important;
    }

    /* === Print aesthetic for the conversation area ============================
       Only paper, text, and hairlines. No filled color blocks, no rounded
       corners, no shadows. Surfaces collapse into the page; hierarchy is
       carried by type (serif body / mono code), weight, indentation, and
       1px rules. --card/--muted are already transparent above, which flattens
       bg-card / bg-muted automatically. The rules below finish the job for
       elements that bake in gradients, borders, radii, or shadows. */

    /* markdown-block sets `overflow-wrap: anywhere`, which collapses the
       min-content intrinsic width to 1ch. Inside the flex-column message
       stack, flex items resolve min-width:auto to min-content, so the text
       block is allowed to shrink to ~1 character wide — any width pressure
       (sidebar + file tree eating 460px, max-w-3xl vs. parent) then squeezes
       it and CJK wraps after a few characters (e.g. 数据覆盖范 / 围). CJK
       already breaks between characters by default, so the aggressive
       `anywhere` is unnecessary; `break-word` only wraps on real overflow
       and does not collapse min-content, so the flex block keeps its width. */
    pi-chat-panel .markdown-content,
    pi-chat-panel markdown-block {
      overflow-wrap: break-word !important;
    }

    /* Body type: serif for prose, mono for code/tool text. */
    pi-chat-panel,
    pi-chat-panel .markdown-content {
      font-family: 'Songti SC', 'STSong', Georgia, 'Times New Roman', serif;
    }
    pi-chat-panel code-block,
    pi-chat-panel .markdown-content code,
    pi-chat-panel tool-message,
    pi-chat-panel .font-mono,
    pi-chat-panel thinking-block {
      font-family: var(--font-mono);
    }

    /* User message: was an orange gradient bubble. Render as a "> " quoted
       block — a floated greater-than glyph at the start, no fill/border/
       radius/blur. The glyph is the print shorthand for quoted text. */
    .user-message-container {
      background: none !important;
      border: none !important;
      border-radius: 0 !important;
      backdrop-filter: none !important;
      padding: 2px 0 !important;
      max-width: 100% !important;
    }
    .user-message-container::before {
      content: ">";
      float: left;
      color: #a09886;
      font-family: var(--font-mono);
      margin-right: 6px;
      line-height: 1.7;
    }

    /* Tool-call cards: drop the card frame for tools that fall back to the
       default renderer (isCustom:false wraps in a card div). Our custom
       box-drawing renderers (isCustom:true) return their own div directly,
       so exclude .gisbuddy-tool-block to avoid conflicting with its styles. */
    tool-message > div:not(.gisbuddy-tool-block) {
      background: none !important;
      border: none !important;
      border-top: 1px solid var(--border) !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      padding: 6px 0 !important;
    }

    /* Code blocks: drop the frame, mark with a left hairline rule. The language
       label and copy control sit to the right of the rule; the pre already has
       no background. */
    code-block > div {
      border: none !important;
      border-left: 1px solid var(--border) !important;
      border-radius: 0 !important;
    }

    /* Inline code: no muted pill — just monospace (bg already transparent via
       --muted). Strip the pill padding/radius so it reads as plain type. */
    .markdown-content code:not(.hljs) {
      background: none !important;
      padding: 0 1px !important;
      border-radius: 0 !important;
    }

    /* Tables: header row loses its fill (already via --muted); keep only a
       bottom rule under the header, drop vertical cell borders for a clean
       printed-table look. */
    .markdown-content th {
      border-right: none !important;
      border-bottom: 1px solid var(--foreground) !important;
    }
    .markdown-content td {
      border-right: none !important;
    }

    /* Error block: was a red-tinted rounded box. Reduce to red text with a
       left rule. */
    .bg-destructive\/10 {
      background: none !important;
      border: none !important;
      border-left: 2px solid var(--destructive) !important;
      border-radius: 0 !important;
      padding-left: 10px !important;
    }

    /* Input area: was a rounded shadowed card. Flatten to a top hairline only;
       the textarea is already transparent. Also neutralize the drag-active
       highlight so it doesn't reintroduce a color block. */
    message-editor > div {
      background: none !important;
      border: none !important;
      border-top: 1px solid var(--border) !important;
      border-radius: 0 !important;
      box-shadow: none !important;
    }
    message-editor .border-primary {
      border-color: var(--border) !important;
    }
    message-editor .bg-primary\/5,
    message-editor .bg-primary\/10 {
      background: none !important;
    }

    /* Thinking indicator: was an animated gradient text shimmer. Replace with
       plain muted italic text — no color, no motion gradient. */
    .animate-shimmer {
      background: none !important;
      -webkit-text-fill-color: #a09886 !important;
      color: #a09886 !important;
    }

    /* Artifacts badge (rare in GISBuddy): flatten the pill to a bordered tag. */
    pi-chat-panel button.absolute > span.rounded-md {
      border-radius: 0 !important;
    }

    /* Pending tool-call dot: gentle opacity pulse for the in-progress state. */
    @keyframes gisbuddy-dot-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    /* Tool-call output body: auto-hide scrollbar. All overflow/sizing is
       controlled here (not inline) so CSS has full authority. Default: no
       scrollbar, content clipped. Hover: reveal a thin scrollbar. */
    .gisbuddy-tool-body {
      margin-top: 2px;
      max-height: 300px;
      overflow-y: hidden;
      scrollbar-width: none;
    }
    .gisbuddy-tool-body:hover {
      overflow-y: auto;
      scrollbar-width: thin;
    }
    .gisbuddy-tool-body::-webkit-scrollbar {
      width: 0;
    }
    .gisbuddy-tool-body:hover::-webkit-scrollbar {
      width: 4px;
    }
    .gisbuddy-tool-body::-webkit-scrollbar-track {
      background: transparent;
    }
    .gisbuddy-tool-body::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.15);
      border-radius: 3px;
    }
    .gisbuddy-tool-body:hover::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 0, 0, 0.3);
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.addEventListener('error', function(e) {
      document.getElementById('app').innerHTML = '<pre style="color:red;padding:20px;">FATAL: ' + e.message + '\n' + (e.error && e.error.stack || '') + '</pre>';
    });
    window.addEventListener('unhandledrejection', function(e) {
      console.error('Unhandled rejection:', e.reason);
    });
  </script>
  <script src="../dist/renderer/bundle.js"></script>
</body>
</html>
