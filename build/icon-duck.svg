<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <g fill="none" stroke="#1a1a2e" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">
    <!-- body -->
    <ellipse cx="240" cy="300" rx="110" ry="85" transform="rotate(-10,240,300)"/>
    <!-- head -->
    <circle cx="330" cy="190" r="65"/>
    <!-- beak -->
    <polyline points="390,180 440,195 390,215"/>
    <!-- eye -->
    <circle cx="350" cy="175" r="10" fill="#1a1a2e"/>
    <!-- eye highlight -->
    <circle cx="353" cy="172" r="3" fill="white" stroke="none"/>
    <!-- wing -->
    <path d="M200,300 Q250,260 300,310"/>
    <!-- tail -->
    <path d="M145,270 Q100,250 120,310"/>
    <!-- leg left -->
    <path d="M200,380 L195,430 M175,430 L195,430 L215,430"/>
    <!-- leg right -->
    <path d="M270,380 L265,430 M245,430 L265,430 L285,430"/>
    <!-- cheek blush -->
    <ellipse cx="345" cy="205" rx="15" ry="10" fill="#f5a0a0" stroke="none" opacity="0.4"/>
  </g>
</svg>
