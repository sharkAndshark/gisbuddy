name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (without leading v). Used only when triggered manually."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-mac:
    name: Build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build (TypeScript + renderer)
        run: npm run build

      - name: Generate macOS icon
        run: node scripts/build-icon.mjs

      - name: Bundle GDAL (Homebrew)
        run: |
          mkdir -p gdal-bin
          echo "=== 提取 GDAL 二进制 ==="
          for cmd in gdalinfo ogrinfo ogr2ogr gdal_translate gdalwarp gdal_calc.py gdal_merge.py gdal_edit.py gdal_rasterize gdal_polygonize.py; do
            p=$(which "$cmd" 2>/dev/null || true)
            if [ -n "$p" ]; then
              cp -fL "$p" gdal-bin/ 2>/dev/null && echo "  ✓ $cmd"
            else
              echo "  ✗ $cmd (未找到)"
            fi
          done
          echo "=== 提取动态库依赖 ==="
          for f in gdal-bin/*; do
            if [ -f "$f" ] && [ -x "$f" ]; then
              for lib in $(otool -L "$f" 2>/dev/null | grep '/opt/homebrew\|/usr/local' | awk '{print $1}'); do
                cp -n "$lib" gdal-bin/ 2>/dev/null || true
              done
            fi
          done
          echo "✓ GDAL 已打包到 gdal-bin/"

      - name: Build & package (dmg + zip)
        run: npx electron-builder --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-mac
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error
          retention-days: 7

  build-win:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Install just (command runner)
        uses: extractions/setup-just@v2

      # resource-prepare-win 需要用 CONDA_PREFIX 定位 GDAL 环境。
      # micromamba action 的 CONDA_PREFIX 指向基础环境，
      # GDAL 在 envs/gdal 子目录下。
      - name: Install GDAL via micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: gdal
          create-args: >-
            gdal=3.12
            python=3.12
          cache-environment: true

      - name: Release build (Windows)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Use forward slashes — bash eats backslashes in $MAMBA_ROOT_PREFIX
        run: |
          just release-win unsigned=1 conda-prefix="${MAMBA_ROOT_PREFIX//\\//}/envs/gdal"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-win
          path: |
            release/*.exe
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name '*.dmg' -o -name '*.zip' -o -name '*.exe' \) \
            -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: release-assets/*
          body: |
            ## GISBuddy ${{ github.ref_name }}

            ### Downloads
            - **macOS (Apple Silicon)**: `.dmg` — drag to Applications
            - **macOS (Intel)**: `.zip` — unzip and run
            - **Windows**: `.exe` — NSIS installer

            ### GDAL
            - macOS: GDAL binaries are bundled (from Homebrew).
            - Windows: GDAL binaries + data files are bundled (from conda-forge).

            ### Third-party licenses
            This release bundles the following third-party software:
            - **BusyBox** (busybox-w32, GPLv2) — bundled shell for Windows.
              Source code: https://gitlab.com/rmyorston/busybox-w32
              Binary source: https://frippery.org/busybox/
            - **GDAL** (MIT/X license) — geospatial data processing library.
              Source code: https://github.com/OSGeo/gdal

            ### Notes
            This is the first public release of GISBuddy.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
